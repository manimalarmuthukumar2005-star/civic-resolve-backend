services:
  - type: web
    name: civic-resolve-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DEV_MODE
        value: false
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
